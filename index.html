<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Studies Assessments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Times New Roman", Times, serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 32px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .assessments {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }
        .assessment-item {
            margin: 15px 0;
        }
        .assessment-item a {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background: #f5f5f5;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.2s;
            border: 2px solid transparent;
        }
        .assessment-item a:hover {
            background: #e8e8e8;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Assessments</h1>
        <p>Welcome! Select an assessment below to begin.</p>
        
        <div class="assessments">
            <div class="assessment-item">
                <a href="assessment.html">
                    <strong>Unit 4: Modern Geopolitics</strong><br>
                    <small>The Cold War and Beyond</small>
                </a>
            </div>
        </div>

        <p style="margin-top: 40px; font-size: 14px; color: #999;">
            💡 Tip: You can download these files and open them on your computer anytime!
        </p>
    </div>
</body>
</html>
